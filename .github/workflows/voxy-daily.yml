name: Voxy Weekly Review Analysis

on:
  workflow_dispatch:
    inputs:
      baseline:
        description: "Save current reviews without sending alerts"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      dry_run:
        description: "Run without sending emails"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  schedule:
    - cron: "0 7 * * 1"

jobs:
  voxy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Restore Voxy memory
        uses: actions/cache@v4
        with:
          path: avis_deja_signales.json
          key: voxy-memory-${{ github.run_id }}
          restore-keys: |
            voxy-memory-

      - name: Run Voxy
        env:
          GOOGLE_SHEET_URL: ${{ secrets.GOOGLE_SHEET_URL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_USE_TLS: ${{ secrets.SMTP_USE_TLS }}
          ALERT_SUBJECT_PREFIX: ${{ secrets.ALERT_SUBJECT_PREFIX }}
          TRANSLATE_REVIEWS_TO_ENGLISH: ${{ secrets.TRANSLATE_REVIEWS_TO_ENGLISH }}
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          FLAGS=""
          if [ "${{ github.event.inputs.baseline }}" = "true" ]; then
            FLAGS="$FLAGS --baseline"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            FLAGS="$FLAGS --dry-run"
          fi
          if [ -n "$GOOGLE_SERVICE_ACCOUNT_JSON" ]; then
            FLAGS="$FLAGS --update-google-sheet-dashboard"
          fi
          python voxy_review_monitor.py \
            --report voxy_dashboard_report.xlsx \
            --timezone Europe/Paris \
            $FLAGS

      - name: Upload dashboard
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: voxy-dashboard-report
          path: voxy_dashboard_report.xlsx
          if-no-files-found: ignore

      - name: Upload Voxy state
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: voxy-state
          path: avis_deja_signales.json
          if-no-files-found: ignore
